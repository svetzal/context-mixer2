# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

# Always scan the full dependency graph (including optional features) so
# advisory suppressions for transitive deps of `llm`-gated crates are
# exercised and the check is comprehensive.
[graph]
all-features = true

[advisories]
version = 2
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    "MPL-2.0",
    "CDLA-Permissive-2.0", # webpki-root-certs (Mozilla CA bundle data)
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
