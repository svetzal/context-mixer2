# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

# Always scan the full dependency graph (including optional features) so
# advisory suppressions for transitive deps of `llm`-gated crates are
# exercised and the check is comprehensive.
[graph]
all-features = true

[advisories]
version = 2
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    "MPL-2.0",
    "CDLA-Permissive-2.0", # webpki-root-certs (Mozilla CA bundle data)
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
# Known duplicate transitive crates from the current mojentic/reqwest/test graph.
# These are tracked explicitly so `cargo deny check` stays warning-free while
# we retain duplicate detection for anything newly introduced.
skip = [
    { crate = "block-buffer", reason = "sha1 and sha2 currently pull different major lines via mojentic's websocket stack" },
    { crate = "core-foundation", reason = "reqwest's TLS stack currently mixes transitive macOS crates across versions" },
    { crate = "cpufeatures", reason = "sha1 and sha2 currently pull different major lines via mojentic's websocket stack" },
    { crate = "crypto-common", reason = "sha1 and sha2 currently pull different major lines via mojentic's websocket stack" },
    { crate = "digest", reason = "sha1 and sha2 currently pull different major lines via mojentic's websocket stack" },
    { crate = "getrandom", reason = "runtime, build, and test-only dependencies currently require separate major lines" },
    { crate = "r-efi", reason = "pulled only through the split getrandom major versions in the transitive graph" },
]

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
