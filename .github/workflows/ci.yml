name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests (default features)
        run: cargo test

      - name: Clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests (all features)
        run: cargo test --all-features

      - name: Docs (workspace, all features)
        # cmx-core denies missing_docs (see cmx-core/Cargo.toml); cmx/cmf still
        # warn on missing per-item docs, so this step doesn't use -D warnings
        # workspace-wide yet — see AGENTS.md
        run: cargo doc --no-deps --all-features --workspace

      - name: Docs (cmx-core, deny warnings)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --all-features -p cmx-core

      - name: Doctests (workspace, all features)
        run: cargo test --doc --all-features

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Cargo deny
        run: cargo deny check
