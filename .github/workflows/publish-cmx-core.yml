name: Publish cmx-core

on:
  push:
    tags: ["cmx-core-v*"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests (default features)
        run: cargo test

      - name: Clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests (all features)
        run: cargo test --all-features

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Cargo deny
        run: cargo deny check

  publish:
    name: Publish to crates.io
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"

      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches crate version
        run: |
          CRATE_VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "cmx-core") | .version')
          TAG_VERSION="${GITHUB_REF_NAME#cmx-core-v}"
          if [ "$CRATE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match cmx-core version $CRATE_VERSION" >&2
            exit 1
          fi

      - name: Publish to crates.io
        run: cargo publish -p cmx-core --token ${{ secrets.CRATES_IO_TOKEN }}
